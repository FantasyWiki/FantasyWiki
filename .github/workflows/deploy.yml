name: Deploy

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy-production:
    if: github.ref_name == 'master'
    uses: ./.github/workflows/deploy-target.yml
    with:
      environment: production
      frontend_url: https://fantasywiki.pages.dev
      frontend_build_mode: production
      frontend_deploy_branch: master
      d1_database_name: db
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_MIGRATION_RUNNER_SECRET: ${{ secrets.CLOUDFLARE_D1_MIGRATION_RUNNER_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PRODUCTION }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_PRODUCTION }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_PRODUCTION }}

  deploy-preview:
    if: github.ref_name == 'dev'
    uses: ./.github/workflows/deploy-target.yml
    with:
      environment: preview
      frontend_url: https://dev.fantasywiki.pages.dev
      frontend_build_mode: preview
      frontend_deploy_branch: dev
      d1_database_name: db-preview
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_MIGRATION_RUNNER_SECRET: ${{ secrets.CLOUDFLARE_D1_MIGRATION_RUNNER_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PREVIEW }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_PREVIEW }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_PREVIEW }}
