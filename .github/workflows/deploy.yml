name: Deploy

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.ref_name == 'master' || github.ref_name == 'dev'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.80.0"
          workingDirectory: "backend"
          command: ${{ github.ref_name == 'master' && 'deploy --name=backend' || 'deploy --name=backend-qa --env=dev' }}
          vars: |
            FRONTEND_URL=${{ github.ref_name == 'master' && 'fantasywiki.pages.dev' || 'frontend-qa.pages.dev' }}

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.ref_name == 'master' || github.ref_name == 'dev'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/package.json"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_BACKEND_URL: ${{ github.ref_name == 'master' && 'luca0patrignani.workers.dev' || 'backend-qa.luca0patrignani.workers.dev' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.80.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "frontend"
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ github.ref_name == 'master' && 'frontend' || 'frontend-qa' }}

  migrate-d1:
    runs-on: ubuntu-latest
    if: github.ref_name == 'master' || github.ref_name == 'dev'
    steps:
      - uses: actions/checkout@v4
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ github.ref_name == 'master' && secrets.CLOUDFLARE_D1_MIGRATION_RUNNER_SECRET || secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.80.0"
          workingDirectory: "backend"
          command: ${{ github.ref_name == 'master' && 'd1 migrations apply db --remote' || 'd1 migrations apply db_dev --remote' }}

  success:
    runs-on: ubuntu-24.04
    needs:
      - deploy-backend
      - deploy-frontend
      - migrate-d1
    if: >-
      always() && (
        contains(join(needs.*.result, ','), 'failure')
        || !contains(join(needs.*.result, ','), 'cancelled')
      )
    steps:
      - name: Verify deploy workflow
        run: ${{ !contains(join(needs.*.result, ','), 'failure') }}
